<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coforge AI</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--bg1:#141416;--bg2:#1c1c1f;--bg3:#242428;
  --border:#2e2e33;--border2:#3a3a40;
  --text:#e8e8ea;--text2:#9494a0;--text3:#55555f;
  --accent:#c97c5d;--accent2:#4a9eff;--green:#3fb950;--red:#f85149;--purple:#bc8cff;
  --code-bg:#0a0a0c;--user-bg:#1e1e22;
  --r:12px;--rs:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;
  --mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  --shadow:0 8px 32px rgba(0,0,0,.5)
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh}

/* ── Header ── */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:44px;min-height:44px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:10px}
.avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#c97c5d,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0}
.hdr-name{font-weight:700;font-size:13px}
#model-bar{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3)}
.mdot{width:5px;height:5px;border-radius:50%;background:var(--text3);transition:background .3s,box-shadow .3s}
.mdot.on{background:var(--green);box-shadow:0 0 5px var(--green)}
.hdr-r{display:flex;gap:2px}
.ibtn{width:30px;height:30px;border-radius:var(--rs);border:none;background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s,color .15s}
.ibtn:hover{background:var(--bg2);color:var(--text)}

/* ── Chat ── */
#chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
#msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 0 12px;scroll-behavior:smooth}
#msgs::-webkit-scrollbar{width:4px}
#msgs::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
.msg-wrap{max-width:760px;margin:0 auto;padding:0 20px;width:100%}

/* User message */
.msg-user{display:flex;justify-content:flex-end;margin-bottom:16px;animation:fadeUp .2s ease}
.user-bub{background:var(--user-bg);border:1px solid var(--border);border-radius:var(--r) var(--r) 4px var(--r);padding:10px 14px;max-width:78%;color:var(--text);word-break:break-word;font-size:14px;line-height:1.65;user-select:text}

/* AI message */
.msg-ai{margin-bottom:20px;animation:fadeUp .2s ease}
.ai-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai-name{font-size:12px;font-weight:600;color:var(--text2)}
.ai-body{padding-left:34px;color:var(--text);font-size:14px;line-height:1.7;word-break:break-word;user-select:text}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Streaming cursor */
.streaming .ai-body>.stream-text::after{content:'▋';animation:blink .7s step-start infinite;color:var(--accent);margin-left:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Reasoning */
.reasoning{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.reasoning-hdr{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg1);cursor:pointer;border:none;width:100%;text-align:left;font-size:11px;color:var(--text3);transition:background .15s}
.reasoning-hdr:hover{background:var(--bg2)}
.chev{transition:transform .2s;font-style:normal}
.reasoning-hdr.open .chev{transform:rotate(90deg)}
.reasoning-body{display:none;padding:10px 12px;font-family:var(--mono);font-size:10.5px;color:var(--text3);background:var(--bg);max-height:180px;overflow-y:auto;white-space:pre-wrap;line-height:1.6}
.reasoning-body.show{display:block}

/* Message actions */
.msg-acts{display:flex;gap:2px;padding:6px 0 0 34px;opacity:0;transition:opacity .15s}
.msg-ai:hover .msg-acts{opacity:1}
.abtn{padding:3px 8px;border-radius:4px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:11px;font-family:var(--font);transition:all .15s}
.abtn:hover{background:var(--bg2);color:var(--text)}

/* Typing indicator */
#typing{display:none;padding:8px 20px;max-width:760px;margin:0 auto;width:100%}
#typing.show{display:flex;align-items:center;gap:8px}
.dots{display:flex;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);animation:bounce 1.2s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* Welcome */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:20px;animation:fadeUp .3s ease}
.w-logo{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#c97c5d,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:32px;color:#fff;box-shadow:0 12px 40px rgba(201,124,93,.25)}
.w-title{font-size:22px;font-weight:700}
.w-sub{font-size:12px;color:var(--text3);text-align:center;max-width:320px}
.chips{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:400px}
.chip{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:var(--r);background:var(--bg1);border:1px solid var(--border);cursor:pointer;transition:all .15s;text-align:left}
.chip:hover{background:var(--bg2);border-color:var(--border2);transform:translateY(-1px)}
.chip-ico{font-size:18px;flex-shrink:0}
.chip-t{font-size:12px;font-weight:600;color:var(--text)}
.chip-s{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Markdown ── */
.md h1{font-size:19px;font-weight:700;margin:14px 0 7px;border-bottom:1px solid var(--border);padding-bottom:6px}
.md h2{font-size:16px;font-weight:700;margin:12px 0 5px}
.md h3{font-size:14px;font-weight:600;margin:10px 0 4px}
.md p{margin:5px 0}
.md ul,.md ol{padding-left:22px;margin:5px 0}
.md li{margin:3px 0}
.md code{font-family:var(--mono);font-size:12px;background:var(--bg2);color:#adbac7;padding:1px 5px;border-radius:3px}
.md pre{margin:0}/* pre handled by code-block */
.md blockquote{border-left:3px solid var(--border2);margin:8px 0;padding-left:12px;color:var(--text2)}
.md hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.md a{color:var(--accent2);text-decoration:none}.md a:hover{text-decoration:underline}
.md strong{font-weight:700}.md em{font-style:italic;color:var(--text2)}.md del{text-decoration:line-through;color:var(--text3)}
.md table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px}
.md th,.md td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.md th{background:var(--bg2);font-weight:600}

/* ── Code block ── */
.code-block{margin:10px 0;border-radius:var(--rs);border:1px solid var(--border);overflow:hidden}
.code-hdr{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
.code-lang{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);letter-spacing:.08em;font-family:var(--mono)}
.code-copy{font-size:11px;padding:2px 8px;border-radius:4px;border:none;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .15s}
.code-copy:hover{background:var(--border2);color:var(--text)}.code-copy.ok{color:var(--green)}
pre.code-pre{background:var(--code-bg);padding:14px 16px;overflow-x:auto;font-family:var(--mono);font-size:12.5px;line-height:1.65;color:#c9d1d9;margin:0}
pre.code-pre::-webkit-scrollbar{height:4px}
pre.code-pre::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

/* Syntax */
.kw{color:#ff7b72}.str{color:#a5d6ff}.num{color:#79c0ff}.cm{color:#8b949e;font-style:italic}.fn{color:#d2a8ff}.cls{color:#ffa657}.ann{color:#ffa657}

/* ── File change ── */
.fc{margin:8px 0;border-radius:var(--rs);border:1px solid var(--border);overflow:hidden;background:var(--bg1)}
.fc-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg2)}
.fc-l{display:flex;align-items:center;gap:8px}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.06em;text-transform:uppercase}
.badge-new{background:rgba(63,185,80,.15);color:var(--green)}
.badge-edit{background:rgba(74,158,255,.15);color:var(--accent2)}
.badge-ok{background:rgba(63,185,80,.2);color:var(--green)}
.fc-path{font-family:var(--mono);font-size:12px;color:var(--text)}
.fc-btns{display:flex;gap:5px;align-items:center}
.fc-btn{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:11px;font-family:var(--font);font-weight:600;transition:all .15s}
.fc-skip{background:none;color:var(--text3)}.fc-skip:hover{color:var(--text)}
.fc-apply{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.25)}.fc-apply:hover{background:rgba(63,185,80,.22)}
.fc-apply.done{opacity:.5;cursor:default;pointer-events:none}

/* Apply all */
.apply-bar{display:flex;align-items:center;justify-content:space-between;margin:12px 0;padding:12px 14px;border-radius:var(--rs);background:var(--bg1);border:1px solid var(--border)}
.apply-bar span{font-size:12px;color:var(--text2)}
.apply-all-btn{padding:7px 16px;border-radius:var(--rs);border:none;background:var(--green);color:#000;font-weight:700;font-size:12px;cursor:pointer;transition:opacity .15s}
.apply-all-btn:hover{opacity:.85}

/* ── Terminal ── */
#term{border-top:1px solid var(--border);background:#090c09;flex-shrink:0;max-height:0;overflow:hidden;transition:max-height .25s ease}
#term.open{max-height:220px;display:flex;flex-direction:column}
.term-hdr{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);flex-shrink:0}
.term-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em}
.term-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px}.term-close:hover{color:var(--text)}
#term-out{flex:1;overflow-y:auto;padding:10px 14px;font-family:var(--mono);font-size:11px;line-height:1.7;color:#98c379;white-space:pre-wrap;word-break:break-all}
#term-out::-webkit-scrollbar{width:3px}
#term-out::-webkit-scrollbar-thumb{background:var(--bg3)}
.t-err{color:#e06c75}.t-warn{color:#e5c07b}.t-ok{color:#98c379}

/* ── Input ── */
#footer{flex-shrink:0;padding:8px 14px 12px;background:var(--bg)}
#input-box{border:1px solid var(--border);border-radius:var(--r);background:var(--bg1);transition:border-color .2s,box-shadow .2s}
#input-box:focus-within{border-color:rgba(201,124,93,.4);box-shadow:0 0 0 3px rgba(201,124,93,.07)}
#attach-bar{display:none;padding:8px 12px 0;gap:6px;flex-wrap:wrap}
#attach-bar.has{display:flex}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px 2px 6px;border-radius:20px;background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.22);font-size:11px;color:var(--accent2);white-space:nowrap;animation:fadeUp .15s}
.pill-x{background:none;border:none;cursor:pointer;color:inherit;font-size:13px;line-height:1;opacity:.6}.pill-x:hover{opacity:1}
.img-pill{background:rgba(188,140,255,.1);border-color:rgba(188,140,255,.22);color:var(--purple)}
.img-th{width:20px;height:20px;border-radius:3px;object-fit:cover;vertical-align:middle}
#file-pop{display:none;position:absolute;bottom:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);max-height:200px;overflow-y:auto;z-index:100;box-shadow:var(--shadow)}
#file-pop.open{display:block}
.fitem{padding:7px 12px;cursor:pointer;font-size:12px;font-family:var(--mono);color:var(--text2);transition:background .1s}
.fitem:hover,.fitem.sel{background:var(--bg3);color:var(--text)}
#inp-wrap{position:relative}
#inp{width:100%;padding:12px 14px 4px;background:none;border:none;color:var(--text);font-family:var(--font);font-size:14px;resize:none;outline:none;line-height:1.65;min-height:48px;max-height:180px;overflow-y:auto}
#inp::placeholder{color:var(--text3)}
#inp::-webkit-scrollbar{width:3px}
#toolbar{display:flex;align-items:center;justify-content:space-between;padding:5px 10px 8px}
.tl{display:flex;align-items:center;gap:4px}
.tr{display:flex;align-items:center;gap:6px}
#status{font-size:11px;color:var(--text3);min-width:60px}
.ibadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.06em;display:none}
.tsep{width:1px;height:14px;background:var(--border);margin:0 2px}
.chip{padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:11px;font-family:var(--font);transition:all .15s}
.chip:hover{background:var(--bg2);color:var(--text);border-color:var(--border2)}
.att-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 4px;transition:color .15s}
.att-btn:hover{color:var(--text)}
#stop{display:none;padding:4px 10px;border-radius:4px;border:1px solid rgba(248,81,73,.3);background:rgba(248,81,73,.1);color:var(--red);cursor:pointer;font-size:11px;font-family:var(--font);font-weight:600}
#stop.show{display:flex;align-items:center;gap:4px}
#send{width:30px;height:30px;border-radius:50%;border:none;background:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
#send:hover{filter:brightness(1.12);transform:scale(1.06)}
#send:disabled{background:var(--bg3);cursor:default;transform:none;filter:none}

/* ── Overlay dialogs ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;align-items:center;justify-content:center}
.overlay.open{display:flex}
.dialog{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r);box-shadow:var(--shadow)}
.dlg-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.dlg-hdr h3{font-size:14px;font-weight:700}
.dlg-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px}.dlg-close:hover{color:var(--text)}
.dlg-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.btn-cancel{padding:7px 14px;border-radius:var(--rs);border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:var(--font)}
.btn-ok{padding:7px 14px;border-radius:var(--rs);border:none;background:var(--green);color:#000;font-weight:700;cursor:pointer;font-family:var(--font)}
/* Apply-all */
#apply-dlg{width:min(90vw,540px);max-height:70vh;display:flex;flex-direction:column}
#apply-list{flex:1;overflow-y:auto;padding:8px 16px}
.apply-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.apply-row:last-child{border-bottom:none}
.apply-row input[type=checkbox]{accent-color:var(--green);width:14px;height:14px;cursor:pointer}
.apply-row label{flex:1;font-family:var(--mono);font-size:12px;color:var(--text);cursor:pointer}
/* Sysline */
.sysline{font-size:11px;color:var(--text3);font-style:italic;padding:3px 0;animation:fadeUp .15s}
</style>
</head>
<body>
<div id="app">

<!-- Header -->
<div id="hdr">
  <div class="hdr-l">
    <div class="avatar">C</div>
    <span class="hdr-name">Coforge AI</span>
    <div id="model-bar">
      <div class="mdot" id="d-kimi"></div><span>Kimi</span>
      <span style="color:var(--border2)">·</span>
      <div class="mdot" id="d-gem"></div><span>Gemini</span>
      <span style="color:var(--border2)">·</span>
      <div class="mdot" id="d-gpt"></div><span>GPT-5</span>
    </div>
  </div>
  <div class="hdr-r">
    <button class="ibtn" title="New chat" onclick="A.reset()">↺</button>
    <button class="ibtn" title="Settings" onclick="A.settings()">⚙</button>
  </div>
</div>

<!-- Chat -->
<div id="chat">
  <div id="msgs">
    <div class="msg-wrap">
      <div id="welcome">
        <div class="w-logo">C</div>
        <div class="w-title">Coforge AI Agent</div>
        <div class="w-sub">Kimi reasons · Gemini reviews · GPT-5 implements<br>Vision · Streaming · Agentic test loop</div>
        <div class="chips">
          <div class="chip" onclick="A.pf('Explain this code:\n\n```\n\n```')">
            <span class="chip-ico">💡</span><div><div class="chip-t">Explain Code</div><div class="chip-s">Deep walkthrough</div></div>
          </div>
          <div class="chip" onclick="A.pf('Fix the bug in:\n\n```\n\n```')">
            <span class="chip-ico">🐛</span><div><div class="chip-t">Fix a Bug</div><div class="chip-s">Diagnose & patch</div></div>
          </div>
          <div class="chip" onclick="A.pf('Implement: ')">
            <span class="chip-ico">🏗️</span><div><div class="chip-t">Build Feature</div><div class="chip-s">End-to-end code</div></div>
          </div>
          <div class="chip" onclick="A.pf('Write tests for:\n\n```\n\n```')">
            <span class="chip-ico">🧪</span><div><div class="chip-t">Write Tests</div><div class="chip-s">Unit & widget</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Typing -->
  <div id="typing">
    <div class="msg-wrap" style="display:flex;align-items:center;gap:8px;padding:4px 0">
      <div class="avatar" style="width:22px;height:22px;font-size:10px">C</div>
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  </div>

  <!-- Terminal -->
  <div id="term">
    <div class="term-hdr">
      <span class="term-title">TERMINAL</span>
      <button class="term-close" onclick="A.closeTerm()">✕</button>
    </div>
    <div id="term-out"></div>
  </div>
</div>

<!-- Footer / Input -->
<div id="footer">
<div id="input-box">
  <div id="attach-bar"></div>
  <div id="inp-wrap">
    <div id="file-pop"></div>
    <textarea id="inp" placeholder="Message Coforge AI… (@ tag file · Shift+Enter newline · Enter send)"></textarea>
  </div>
  <div id="toolbar">
    <div class="tl">
      <span id="status"></span>
      <span id="ibadge" class="ibadge"></span>
      <button id="stop" onclick="A.stop()">⬛ Stop</button>
      <div class="tsep"></div>
      <button class="chip" onclick="A.runTests()">▶ Tests</button>
      <button class="chip" onclick="A.runBuild()">⚙ Build</button>
      <button class="chip" onclick="A.runLint()">✓ Lint</button>
    </div>
    <div class="tr">
      <button class="att-btn" title="Attach image" onclick="A.pickImg()">📎</button>
      <button id="send" title="Send (Enter)" onclick="A.send()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>
</div>
</div>
</div>

<!-- Apply-all dialog -->
<div class="overlay" id="apply-ov" onclick="if(event.target===this)A.closeApply()">
  <div class="dialog" id="apply-dlg">
    <div class="dlg-hdr"><h3>Apply Changes</h3><button class="dlg-close" onclick="A.closeApply()">✕</button></div>
    <div id="apply-list"></div>
    <div class="dlg-footer">
      <button class="btn-cancel" onclick="A.closeApply()">Cancel</button>
      <button class="btn-ok" onclick="A.confirmApply()">Apply Selected</button>
    </div>
  </div>
</div>

<script>
// ── Bridge ────────────────────────────────────────────────────────────────────
let _bridge = null;
function send2k(obj){ if(_bridge) _bridge(JSON.stringify(obj)); }
window._bridgeReady = fn => { _bridge = fn; send2k({type:'file_list'}); };

window.onK = raw => {
  const m = JSON.parse(raw);
  switch(m.type){
    case 'token':     A.onToken(m.data);    break;
    case 'reasoning': A.onReason(m.data);   break;
    case 'status':    A.setStatus(m.data);  break;
    case 'complete':  A.onComplete(m.data); break;
    case 'file_list': A.setFiles(m.data);   break;
    case 'term_line': A.termLine(m.data, m.cls); break;
    case 'term_done': A.termDone(m.ok, m.summary); break;
    case 'applied':   A.onApplied(m.path);  break;
    case 'apply_err': A.onApplyErr(m.path, m.msg); break;
    case 'reset':     A.clearMsgs();        break;
  }
};

// ── Markdown ──────────────────────────────────────────────────────────────────
const MD = (() => {
  const e = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const KW = {
    kotlin:/\b(fun|val|var|class|object|interface|enum|data|sealed|open|override|private|public|protected|internal|companion|suspend|when|if|else|for|while|return|import|package|null|true|false|this|super|init|constructor|by|in|out|is|as|throw|try|catch|finally|abstract|lateinit|const|inline|reified)\b/g,
    java:  /\b(public|private|protected|class|interface|static|final|void|int|long|boolean|String|null|true|false|new|return|import|package|if|else|for|while|throw|try|catch|finally|abstract)\b/g,
    dart:  /\b(void|var|final|const|class|abstract|extends|implements|mixin|return|if|else|for|while|null|true|false|async|await|import|late|required|dynamic|Widget|State|BuildContext)\b/g,
    js:    /\b(const|let|var|function|class|return|if|else|for|while|async|await|new|null|undefined|true|false|import|export|default|this|typeof|instanceof|throw|try|catch|finally)\b/g,
    python:/\b(def|class|return|if|elif|else|for|while|import|from|as|None|True|False|and|or|not|in|is|lambda|yield|async|await|self|pass)\b/g,
  };

  function hl(code, lang) {
    let s = e(code);
    // strings
    s = s.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`[^`]*`)/g, m=>`<span class=str>${m}</span>`);
    // comments
    s = s.replace(/(\/\/[^\n]*)/g, m=>`<span class=cm>${m}</span>`);
    s = s.replace(/(\/\*[\s\S]*?\*\/)/g, m=>`<span class=cm>${m}</span>`);
    s = s.replace(/(#[^\n]*)/g, m=>`<span class=cm>${m}</span>`);
    // annotations
    s = s.replace(/(@\w+)/g, m=>`<span class=ann>${m}</span>`);
    // numbers
    s = s.replace(/\b(\d+\.?\d*[fFdDlL]?)\b/g, m=>`<span class=num>${m}</span>`);
    // keywords
    const kw = KW[lang] || KW.kotlin;
    s = s.replace(kw, m=>`<span class=kw>${m}</span>`);
    return s;
  }

  function inline(s) {
    s = e(s);
    s = s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    s = s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/__(.+?)__/g,'<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g,'<em>$1</em>');
    s = s.replace(/~~(.+?)~~/g,'<del>$1</del>');
    s = s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s = s.replace(/\[([^\]]+)\]\([^)]+\)/g,'<a href="#" onclick="return false">$1</a>');
    return s;
  }

  function codeBlock(lang, code) {
    const id = Math.random().toString(36).slice(2);
    const hi = hl(code, lang.toLowerCase());
    const esc = code.replace(/\\/g,'\\\\').replace(/`/g,'\\`');
    return `<div class="code-block"><div class="code-hdr"><span class="code-lang">${e(lang)||'code'}</span><button class="code-copy" id="cc${id}" onclick="copyCode(this,\`${esc}\`)">Copy</button></div><pre class="code-pre"><code>${hi}</code></pre></div>`;
  }

  function render(md) {
    const blocks = []; // extracted code blocks
    md = md.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code)=>{
      const i = blocks.length;
      blocks.push({lang, code: code.trimEnd()});
      return `\x00BLOCK${i}\x00`;
    });

    const lines = md.split('\n');
    let html='', inUl=false, inOl=false, inBq=false;
    const cAll = ()=>{
      if(inUl){html+='</ul>';inUl=false}
      if(inOl){html+='</ol>';inOl=false}
      if(inBq){html+='</blockquote>';inBq=false}
    };

    for(const line of lines){
      const bm = line.match(/^\x00BLOCK(\d+)\x00$/);
      if(bm){ cAll(); const b=blocks[+bm[1]]; html+=codeBlock(b.lang,b.code); continue; }
      if(line.startsWith('### ')){cAll();html+=`<h3>${inline(line.slice(4))}</h3>`;continue}
      if(line.startsWith('## ')){ cAll();html+=`<h2>${inline(line.slice(3))}</h2>`;continue}
      if(line.startsWith('# ')){  cAll();html+=`<h1>${inline(line.slice(2))}</h1>`;continue}
      if(/^---+$/.test(line)){    cAll();html+='<hr>';continue}
      if(line.startsWith('> ')){
        if(inUl||inOl)cAll();
        if(!inBq){html+='<blockquote>';inBq=true}
        html+=inline(line.slice(2))+' ';continue
      }
      if(/^[-*] /.test(line)){
        if(inOl||inBq)cAll();
        if(!inUl){html+='<ul>';inUl=true}
        html+=`<li>${inline(line.slice(2))}</li>`;continue
      }
      if(/^\d+\. /.test(line)){
        if(inUl||inBq)cAll();
        if(!inOl){html+='<ol>';inOl=true}
        html+=`<li>${inline(line.replace(/^\d+\. /,''))}</li>`;continue
      }
      if(line.trim()===''){cAll();html+='<p></p>';continue}
      cAll();html+=`<p>${inline(line)}</p>`;
    }
    cAll(); return html;
  }

  return {render};
})();

function copyCode(btn, code){
  navigator.clipboard?.writeText(code).catch(()=>send2k({type:'copy',text:code}));
  btn.textContent='Copied!';btn.classList.add('ok');
  setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok')},1600);
}

// ── File change parser ────────────────────────────────────────────────────────
function parseFC(text){
  const out=[];
  const fc=/<file_change\s+path="([^"]+)">([\s\S]*?)<\/file_change>/g;
  const nf=/<new_file\s+path="([^"]+)">([\s\S]*?)<\/new_file>/g;
  let m;
  while((m=fc.exec(text))!==null)out.push({path:m[1].trim(),content:m[2].trim(),isNew:false});
  while((m=nf.exec(text))!==null)out.push({path:m[1].trim(),content:m[2].trim(),isNew:true});
  return out;
}

// ── App ───────────────────────────────────────────────────────────────────────
const A = (() => {
  let streaming=false, streamEl=null, streamRaw='', bodyEl=null, reasonEl=null;
  let allChanges=[], pendImgs=[], taggedFiles=[], fileList=[], filePicking=false, fileQ='';
  let applyPending=[];

  const $msgs   = document.getElementById('msgs');
  const $welcome= document.getElementById('welcome');
  const $typing = document.getElementById('typing');
  const $inp    = document.getElementById('inp');
  const $status = document.getElementById('status');
  const $ibadge = document.getElementById('ibadge');
  const $stop   = document.getElementById('stop');
  const $send   = document.getElementById('send');
  const $abar   = document.getElementById('attach-bar');
  const $term   = document.getElementById('term');
  const $termO  = document.getElementById('term-out');
  const $fpop   = document.getElementById('file-pop');
  const $applyOv= document.getElementById('apply-ov');
  const $applyL = document.getElementById('apply-list');

  // Input auto-grow
  $inp.addEventListener('input', ()=>{
    $inp.style.height='auto';
    $inp.style.height=Math.min($inp.scrollHeight,180)+'px';
    handleAt();
  });
  $inp.addEventListener('keydown', e=>{
    if(filePicking){navPop(e);return}
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}
  });

  // @ file picker
  function handleAt(){
    const val=$inp.value, cur=$inp.selectionStart, before=val.slice(0,cur);
    const ai=before.lastIndexOf('@');
    if(ai>=0&&!before.slice(ai+1).includes(' ')){
      fileQ=before.slice(ai+1).toLowerCase(); renderPop();
    } else closePop();
  }
  function renderPop(){
    const f=fileList.filter(n=>n.toLowerCase().includes(fileQ)).slice(0,12);
    if(!f.length){closePop();return}
    $fpop.innerHTML=f.map((n,i)=>`<div class="fitem${i===0?' sel':''}" onmousedown="A.selFile('${n.replace(/'/g,"&#39;")}',event)">${n}</div>`).join('');
    $fpop.classList.add('open'); filePicking=true;
  }
  function closePop(){$fpop.classList.remove('open');filePicking=false}
  function navPop(e){
    const items=[...$fpop.querySelectorAll('.fitem')];
    let sel=items.findIndex(el=>el.classList.contains('sel'));
    if(e.key==='ArrowDown'){e.preventDefault();sel=(sel+1)%items.length;items.forEach((el,i)=>el.classList.toggle('sel',i===sel))}
    else if(e.key==='ArrowUp'){e.preventDefault();sel=(sel-1+items.length)%items.length;items.forEach((el,i)=>el.classList.toggle('sel',i===sel))}
    else if(e.key==='Enter'){e.preventDefault();const s=$fpop.querySelector('.sel');if(s)selFile(s.textContent,e)}
    else if(e.key==='Escape')closePop();
  }
  function selFile(name,e){
    if(e)e.preventDefault();
    const val=$inp.value, cur=$inp.selectionStart, ai=val.slice(0,cur).lastIndexOf('@');
    $inp.value=val.slice(0,ai)+val.slice(cur); closePop();
    addFilePill(name); $inp.focus();
    send2k({type:'tag_file',name});
  }

  // Attach pills
  function addFilePill(name){
    if(taggedFiles.includes(name))return; taggedFiles.push(name);
    const div=document.createElement('div'); div.className='pill'; div.dataset.f=name;
    div.innerHTML=`📄 ${name} <button class="pill-x" onclick="A.remFile('${name.replace(/'/g,"&#39;")}')">×</button>`;
    $abar.appendChild(div); $abar.classList.add('has');
  }
  function remFile(name){
    taggedFiles=taggedFiles.filter(f=>f!==name);
    const el=$abar.querySelector(`[data-f="${name}"]`);if(el)el.remove();
    if(!$abar.children.length)$abar.classList.remove('has');
  }
  function addImage(b64,name){
    pendImgs.push(b64);const idx=pendImgs.length-1;
    const div=document.createElement('div'); div.className='pill img-pill'; div.dataset.i=idx;
    div.innerHTML=`<img class="img-th" src="data:image/png;base64,${b64}"> ${name} <button class="pill-x" onclick="A.remImg(${idx})">×</button>`;
    $abar.appendChild(div); $abar.classList.add('has');
  }
  function remImg(idx){
    pendImgs[idx]=null;
    const el=$abar.querySelector(`[data-i="${idx}"]`);if(el)el.remove();
    if(!$abar.children.length)$abar.classList.remove('has');
  }

  function showChat(){$welcome.style.display='none'}

  // ── Messages ──
  function addUser(text,imgCount){
    showChat();
    const wrap=mkWrap();
    const img=imgCount>0?`<div style="color:var(--accent2);font-size:11px;margin-top:4px">📎 ${imgCount} image(s)</div>`:'';
    wrap.innerHTML=`<div class="msg-user"><div class="user-bub md">${MD.render(text)}${img}</div></div>`;
    $msgs.appendChild(wrap); scrollB();
  }

  function startAI(){
    showChat();
    $typing.classList.remove('show');
    const wrap=mkWrap();
    wrap.innerHTML=`
      <div class="msg-ai" id="cur-msg">
        <div class="ai-meta"><div class="avatar" style="width:22px;height:22px;font-size:10px">C</div><span class="ai-name">Coforge AI</span></div>
        <div class="reasoning" style="display:none">
          <button class="reasoning-hdr" onclick="toggleR(this)"><i class="chev">▶</i> Thinking</button>
          <div class="reasoning-body"></div>
        </div>
        <div class="ai-body">
          <div class="stream-text"></div>
        </div>
        <div class="msg-acts">
          <button class="abtn" onclick="A.copyLast()">Copy</button>
          <button class="abtn" onclick="A.retry()">Retry</button>
        </div>
      </div>`;
    $msgs.appendChild(wrap);
    const msg=wrap.querySelector('#cur-msg');
    msg.classList.add('streaming');
    streamEl=msg.querySelector('.stream-text');
    bodyEl=msg.querySelector('.ai-body');
    reasonEl=msg.querySelector('.reasoning');
    streaming=true; streamRaw=''; scrollB();
  }

  function toggleR(btn){
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('show');
  }
  window.toggleR=toggleR;

  function onToken(tok){
    $typing.classList.remove('show');
    if(!streaming){startAI()}
    streamRaw+=tok;
    if(streamEl) streamEl.textContent=streamRaw;
    scrollB();
  }

  function onReason(text){
    if(!reasonEl)return;
    reasonEl.style.display='block';
    const b=reasonEl.querySelector('.reasoning-body');
    if(b)b.textContent=text;
  }

  function onComplete(full){
    $typing.classList.remove('show');
    if(!streaming){startAI()}
    streaming=false;
    const msg=$msgs.querySelector('#cur-msg');
    if(msg){msg.classList.remove('streaming');msg.removeAttribute('id')}
    allChanges=parseFC(full);
    if(bodyEl){
      bodyEl.innerHTML='';
      const disp=full.replace(/<file_change[^>]*>[\s\S]*?<\/file_change>/g,'')
                     .replace(/<new_file[^>]*>[\s\S]*?<\/new_file>/g,'').trim();
      const md=document.createElement('div'); md.className='md';
      md.innerHTML=MD.render(disp); bodyEl.appendChild(md);
      allChanges.forEach(fc=>bodyEl.appendChild(buildFC(fc)));
      if(allChanges.length>=2){
        const bar=document.createElement('div'); bar.className='apply-bar';
        bar.innerHTML=`<span>${allChanges.length} files proposed</span><button class="apply-all-btn" onclick="A.openApply()">Apply All ${allChanges.length}</button>`;
        bodyEl.appendChild(bar);
      }
    }
    streamEl=null; bodyEl=null; reasonEl=null; streamRaw='';
    setSending(false); scrollB();
  }

  function buildFC(fc){
    const id='fc-'+Math.random().toString(36).slice(2);
    const div=document.createElement('div'); div.className='fc'; div.id=id; div._fc=fc;
    div.innerHTML=`<div class="fc-hdr">
      <div class="fc-l">
        <span class="badge ${fc.isNew?'badge-new':'badge-edit'}">${fc.isNew?'NEW':'EDIT'}</span>
        <span class="fc-path">${fc.path}</span>
      </div>
      <div class="fc-btns">
        <button class="fc-btn fc-skip" onclick="document.getElementById('${id}').remove()">Skip</button>
        <button class="fc-btn fc-apply" id="${id}-ab" onclick="A.applyOne('${id}')">Apply</button>
      </div>
    </div>`;
    return div;
  }

  // ── Send ──
  function send(){
    const text=$inp.value.trim();
    const imgs=pendImgs.filter(Boolean);
    if(!text&&!imgs.length)return;
    if(streaming)return;
    $inp.value=''; $inp.style.height='auto';
    const tagged=[...taggedFiles];
    pendImgs=[]; taggedFiles=[]; $abar.innerHTML=''; $abar.classList.remove('has');
    addUser(text,imgs.length);
    $typing.classList.add('show'); setSending(true);
    send2k({type:'send',text,images:imgs,tagged});
  }

  function setSending(on){
    $send.disabled=on; $stop.classList.toggle('show',on);
    if(!on){setStatus('');$ibadge.style.display='none';resetDots()}
  }
  function setStatus(s){
    $status.textContent=s;
    if(/kimi/i.test(s))   setDot('kimi');
    else if(/gemini/i.test(s)) setDot('gem');
    else if(/gpt|implement/i.test(s)) setDot('gpt');
  }
  const DOTS={kimi:'d-kimi',gem:'d-gem',gpt:'d-gpt'};
  function setDot(k){ Object.values(DOTS).forEach(id=>document.getElementById(id)?.classList.remove('on')); document.getElementById(DOTS[k])?.classList.add('on'); }
  function resetDots(){ Object.values(DOTS).forEach(id=>document.getElementById(id)?.classList.remove('on')); }

  // ── Actions ──
  function stop(){send2k({type:'stop'});setSending(false);$typing.classList.remove('show')}
  function settings(){send2k({type:'settings'})}
  function pickImg(){send2k({type:'pick_image'})}
  function runTests(){send2k({type:'run_tests'})}
  function runBuild(){send2k({type:'run_build'})}
  function runLint(){send2k({type:'run_lint'})}
  function pf(text){$inp.value=text;$inp.style.height='auto';$inp.style.height=Math.min($inp.scrollHeight,180)+'px';$inp.focus();$inp.setSelectionRange(text.length,text.length)}
  function prefill(text){pf(text)}
  function reset(){send2k({type:'reset'})}
  function clearMsgs(){
    $msgs.innerHTML=''; $msgs.appendChild(mkWrap()); $msgs.firstChild.appendChild($welcome);
    $welcome.style.display=''; $typing.classList.remove('show');
    allChanges=[]; setSending(false); setStatus('');
  }
  function retry(){send2k({type:'retry'})}
  function copyLast(){navigator.clipboard?.writeText(streamRaw).catch(()=>send2k({type:'copy',text:streamRaw}))}

  // Apply
  function applyOne(id){
    const el=document.getElementById(id); if(!el||!el._fc)return;
    const btn=document.getElementById(id+'-ab');
    if(btn){btn.textContent='Applying…';btn.classList.add('done')}
    send2k({type:'apply_file',path:el._fc.path,content:el._fc.content,is_new:el._fc.isNew});
  }
  function onApplied(path){
    sysLine(`✓ Applied: ${path}`);
    document.querySelectorAll('.fc').forEach(el=>{
      if(el._fc?.path===path){const b=el.querySelector('.fc-apply');if(b){b.innerHTML='<span class="badge badge-ok">DONE</span>';b.classList.add('done')}}
    });
  }
  function onApplyErr(path,msg){sysLine(`✗ Failed: ${path} — ${msg}`,true)}
  function openApply(){
    applyPending=[...allChanges];
    $applyL.innerHTML=applyPending.map((fc,i)=>`
      <div class="apply-row">
        <input type="checkbox" id="ac${i}" checked>
        <label for="ac${i}">${fc.isNew?'+ ':'~ '}${fc.path}</label>
        <span class="badge ${fc.isNew?'badge-new':'badge-edit'}">${fc.isNew?'NEW':'EDIT'}</span>
      </div>`).join('');
    $applyOv.classList.add('open');
  }
  function closeApply(){$applyOv.classList.remove('open')}
  function confirmApply(){
    const sel=applyPending.filter((_,i)=>{const cb=document.getElementById('ac'+i);return cb?.checked});
    closeApply();
    send2k({type:'apply_all',files:sel});
  }

  // Terminal
  function openTerminal(label){$termO.textContent='';if(label)addTLine(`$ ${label}\n`,'');$term.classList.add('open')}
  function closeTerm(){$term.classList.remove('open')}
  function termLine(line,cls){addTLine(line,cls?'t-'+cls:'')}
  function addTLine(line,cls){
    const s=document.createElement('span');s.className=cls||'';s.textContent=line;
    $termO.appendChild(s);$termO.scrollTop=$termO.scrollHeight;
  }
  function termDone(ok,summary){addTLine('\n'+(summary||'')+'.\n',ok?'t-ok':'t-err')}

  function sysLine(text, isErr){
    showChat();
    const wrap=mkWrap();
    wrap.innerHTML=`<div class="sysline" style="color:${isErr?'var(--red)':'var(--text3)'}">${text}</div>`;
    $msgs.appendChild(wrap); scrollB();
  }

  function setFiles(list){fileList=list||[]}
  function startStream(){if(!streaming)startAI()}

  function mkWrap(){const d=document.createElement('div');d.className='msg-wrap';return d}
  function scrollB(){requestAnimationFrame(()=>{$msgs.scrollTop=$msgs.scrollHeight})}

  return {
    send,stop,reset,settings,pickImg,runTests,runBuild,runLint,pf,prefill,
    onToken,onReason,onComplete,setStatus,setFiles,
    applyOne,onApplied,onApplyErr,openApply,closeApply,confirmApply,
    openTerminal,closeTerm,termLine,termDone,
    addImage,remImg,remFile,
    selFile,clearMsgs,retry,copyLast,sysLine,startStream
  };
})();
// Alias for Kotlin-side js() calls which use App.xxx()
const App = A;
</script>
</body>
