# Force Gradle to use Java 17 for the build process
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
kotlin.code.style=official
# Disable automatic stdlib dependency to avoid conflicts with the IntelliJ Platform
kotlin.stdlib.default.dependency=false
# Removed the hardcoded jdk-11 path to allow the system JAVA_HOME (Java 17) to take precedence.

# Plugin Version Management - Increment this for each new build
pluginVersion=1.2.0
